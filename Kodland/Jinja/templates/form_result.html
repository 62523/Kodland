<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wynik formularza</title>
</head>

<body>
    {% block content %}
    <h1>Dziękujemy za wypełnienie formularza!</h1>
    <P>Twoje imie: {{name}}</P>

    <P>Twój wskazany termin: {{date}}</P>
    {% endblock %}
</body>

</html>
